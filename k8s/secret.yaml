# NOTE: This is a template. Create a SealedSecret using kubeseal.
# Example:
#   kubectl create secret generic prompt-analyzer-secrets \
#     --namespace=prompt-analyzer \
#     --from-literal=DATABASE_URL="postgresql://prompt:prompt123@prompt-db-service:5432/prompts" \
#     --from-literal=MINIO_ACCESS_KEY="your-access-key" \
#     --from-literal=MINIO_SECRET_KEY="your-secret-key" \
#     --dry-run=client -o yaml | kubeseal -o yaml > sealed-secret.yaml
#
# For now, using External Secrets or manual secret creation before deployment.
apiVersion: v1
kind: Secret
metadata:
  name: prompt-analyzer-secrets
  namespace: prompt-analyzer
type: Opaque
stringData:
  # Database connection (internal k8s service)
  DATABASE_URL: "postgresql://prompt:prompt123@prompt-db-service:5432/prompts"
  # MinIO credentials - must be set before deployment
  MINIO_ACCESS_KEY: "REPLACE_ME"
  MINIO_SECRET_KEY: "REPLACE_ME"
