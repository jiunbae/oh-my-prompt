apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-analyzer
  namespace: prompt-analyzer
  labels:
    app: prompt-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prompt-analyzer
  template:
    metadata:
      labels:
        app: prompt-analyzer
    spec:
      imagePullSecrets:
        - name: registry-creds
      containers:
        - name: prompt-analyzer
          image: registry.jiun.dev/prompt-analyzer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: prompt-analyzer-config
            - secretRef:
                name: prompt-analyzer-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
