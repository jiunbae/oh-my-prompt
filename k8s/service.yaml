apiVersion: v1
kind: Service
metadata:
  name: prompt-analyzer-service
  namespace: prompt-analyzer
spec:
  selector:
    app: prompt-analyzer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: prompt-db-service
  namespace: prompt-analyzer
spec:
  selector:
    app: prompt-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: prompt-analyzer
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
