apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prompt-analyzer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jiunbae/IaC.git
    targetRevision: main
    path: kubernetes/apps/prompt-analyzer
  destination:
    server: https://kubernetes.default.svc
    namespace: prompt-analyzer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
