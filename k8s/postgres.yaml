apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-db
  namespace: prompt-analyzer
  labels:
    app: prompt-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prompt-db
  template:
    metadata:
      labels:
        app: prompt-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "prompt"
            - name: POSTGRES_PASSWORD
              value: "prompt123"
            - name: POSTGRES_DB
              value: "prompts"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: prompt-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prompt-db-pvc
  namespace: prompt-analyzer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
