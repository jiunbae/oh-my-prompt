apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prompt-analyzer

resources:
  - namespace.yaml
  - configmap.yaml
  - init-sql.yaml
  - redis.yaml
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - cronjob.yaml

# Image tag is managed by GitOps CI pipeline
# CI builds image -> pushes to registry -> updates newTag -> ArgoCD syncs
images:
  - name: registry.jiun.dev/prompt-analyzer
    newTag: latest
