apiVersion: batch/v1
kind: CronJob
metadata:
  name: prompt-analyzer-sync
  namespace: prompt-analyzer
spec:
  schedule: "*/10 * * * *"  # Every 10 minutes (configurable)
  concurrencyPolicy: Forbid  # Don't run if previous job still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
          - name: sync
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c
            - |
              curl -X POST \
                "http://prompt-analyzer-service.prompt-analyzer.svc.cluster.local/api/sync" \
                -H "Content-Type: application/json" \
                -d '{"type":"incremental","syncType":"cron"}' \
                --fail \
                --silent \
                --show-error
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
          restartPolicy: Never
