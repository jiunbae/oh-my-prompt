apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oh-my-prompt-ingress
  namespace: oh-my-prompt
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - prompt.example.com  # TODO: Replace with your domain
      secretName: oh-my-prompt-tls
  rules:
    - host: prompt.example.com  # TODO: Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oh-my-prompt-service
                port:
                  number: 80
