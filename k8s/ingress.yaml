apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prompt-analyzer-ingress
  namespace: prompt-analyzer
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - prompt.example.com
      secretName: prompt-analyzer-tls
  rules:
    - host: prompt.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prompt-analyzer-service
                port:
                  number: 80
